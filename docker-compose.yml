services:
  backend:
    build: ./backend
    container_name: node_backend
    expose:
      - "5000"
    env_file:
      - backend/.env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80" 
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped