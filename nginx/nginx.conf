events {
    # Handles max connections per worker
    worker_connections 1024;
}

http {
    # 1. Define Rate Limiting Zone
    # Key: $binary_remote_addr (Client IP)
    # Zone: 10 megabytes of memory allocated to store IPs
    # Rate: 10 requests per second allowed per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 2. Define your backend upstream
    upstream node_backend {
        # '5000' is the port exposed by your Node.js container
        server backend:5000;
    }

    server {
        # NGINX listens on standard HTTP port 80
        listen 80;

        location / {
            # Apply the rate limit
            # burst=20: Allows short spikes of up to 20 requests
            # nodelay: Processes those bursts immediately without artificial throttling
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy traffic to the upstream defined above
            proxy_pass http://node_backend;

            # Forward essential headers to your Node app
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}